<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Me - 160864</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header class="site-header">
        <h1>Contact Me</h1>
        <p>CIS Student - Web & Mobile Development Enthusiast</p>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="contact.html" class="active">Contact Me</a>
        </nav>
    </header>

    <main class="container">
        <section class="contact-form-section">
            <h2>Get in Touch</h2>
            <p>
                Feel free to contact me if you are interested in web or mobile application projects,
                collaborations, or have any questions.
            </p>

            <form id="contactForm">
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com">
                </div>

                <div class="form-group">
                    <label for="country">Country:</label>
                    <input type="text" id="country" name="country" placeholder="Enter your country">
                </div>

                <div class="form-group">
                    <label for="comments">Comments:</label>
                    <textarea id="comments" name="comments" rows="4" placeholder="Write your message here"></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Your Full Name - CIS Portfolio</p>
    </footer>
</body>
</html>
